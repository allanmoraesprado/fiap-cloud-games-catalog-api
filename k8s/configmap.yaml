apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-api-config
  namespace: fcg
data:
  # Service-specific, non-sensitive config. Shared values (JWT issuer/audience,
  # Kafka bootstrap) come from the orchestration ConfigMap `fcg-config`.
  Kafka__OrderPlacedTopic: "fcg.orders.placed"
  Kafka__PaymentProcessedTopic: "fcg.payments.processed"
  Kafka__PaymentsConsumerGroup: "catalog-service"
